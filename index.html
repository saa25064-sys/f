<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FUGITIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700;900&display=swap');

        :root {
            --bg: #000000;
            --fg: #ffffff;
            --accent: #ff0033;
            --dim: #444444;
            --panel-bg: rgba(5, 5, 5, 0.95);
            --sys: 'Share Tech Mono', monospace;
            --txt: 'Noto Sans JP', sans-serif;
        }

        /* 全要素からデフォルトのマウスカーソルを消去し、独自のものを常に使う */
        * { box-sizing: border-box; user-select: none; -webkit-user-drag: none; cursor: none !important; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; color: var(--fg);
            font-family: var(--sys); overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            touch-action: none;
        }

        /* 常時表示されるカスタムクロスヘア（十字） */
        #crosshair {
            position: fixed; width: 28px; height: 28px; pointer-events: none; z-index: 999999;
            transform: translate(-50%, -50%); display: block;
            transition: width 0.1s, height 0.1s;
        }
        #crosshair .vline { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: var(--fg); transform: translateX(-50%); transition: background 0.1s;}
        #crosshair .hline { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: var(--fg); transform: translateY(-50%); transition: background 0.1s;}
        #crosshair.clicking { width: 16px; height: 16px; }
        #crosshair.clicking .vline, #crosshair.clicking .hline { background: var(--accent); }

        /* Game Area */
        #game-wrapper {
            position: relative; width: 800px; height: 600px;
            background-color: var(--bg); border: 2px solid var(--dim);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }
        
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

        /* CRT Overlay */
        #game-wrapper::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 2px, transparent 2px, transparent 4px);
            z-index: 90; pointer-events: none;
        }

        /* Screens */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.92); z-index: 100; backdrop-filter: blur(4px);
            padding: 20px; text-align: center; pointer-events: auto;
        }
        .screen.active { display: flex; }

        .title-text {
            font-size: 90px; font-weight: 900; letter-spacing: 25px; margin-bottom: 60px;
            color: var(--fg); text-transform: uppercase; text-shadow: 4px 4px 0 var(--dim);
        }
        
        h2 { font-size: 28px; margin-bottom: 40px; letter-spacing: 5px; font-weight: normal; color: var(--fg); border-bottom: 1px solid var(--dim); padding-bottom: 10px;}
        
        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%; }
        button {
            background: transparent; border: 1px solid var(--dim); color: var(--fg);
            font-family: var(--sys); font-size: 22px; padding: 15px 20px;
            text-transform: uppercase; width: 320px; letter-spacing: 6px;
            transition: all 0.2s; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            pointer-events: auto;
        }
        button::before { content: '>'; position: absolute; left: -20px; transition: left 0.2s; opacity: 0; top: 50%; transform: translateY(-50%); font-weight: bold;}
        button:hover { background: var(--fg); color: var(--bg); border-color: var(--fg); padding-left: 30px; }
        button:hover::before { left: 10px; opacity: 1; color: var(--bg); }
        button:disabled { border-color: #222; color: #444; pointer-events: none; }
        
        .btn-small { width: auto; min-width: 140px; padding: 10px 20px; font-size: 16px; clip-path: none; border-radius: 2px;}
        .danger { border-color: var(--accent); color: var(--accent); }
        .danger:hover { background: var(--accent); color: #fff; }

        /* Emblems */
        #emblem-container { position: absolute; bottom: 30px; display: flex; gap: 20px; }
        .emblem {
            width: 40px; height: 40px; border: 1px solid #333; color: #333;
            display: flex; justify-content: center; align-items: center; font-size: 20px; 
            transition: all 0.3s; background: rgba(0,0,0,0.8); pointer-events: auto;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        .emblem.unlocked { border-color: var(--fg); color: var(--bg); background: var(--fg); box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .emblem-hint {
            position: absolute; bottom: 85px; font-size: 13px; color: var(--fg); font-family: var(--txt);
            background: rgba(10,10,10,0.95); padding: 10px 15px; border: 1px solid var(--dim);
            opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: pre-line; text-align: center;
        }
        .emblem:hover .emblem-hint { opacity: 1; }

        /* HUD */
        #hud-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50; display: none;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 15%, transparent 25%);
        }
        .hud-header {
            position: absolute; top: 15px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .hud-box { display: flex; flex-direction: column; min-width: 250px; }
        .hud-right { align-items: flex-end; }
        .hud-label { font-size: 11px; color: #888; letter-spacing: 2px; margin-bottom: 2px; font-weight: bold;}
        .hud-title { font-size: 16px; font-weight: bold; letter-spacing: 2px; color: var(--fg); text-shadow: 1px 1px 0 #000;}
        
        .hp-container { display: flex; gap: 3px; margin-top: 5px; flex-wrap: wrap; max-width: 200px;}
        .hp-block { width: 16px; height: 10px; border: 1px solid var(--dim); background: transparent; transform: skewX(-30deg); }
        .hp-block.filled { background: var(--fg); border-color: var(--fg); box-shadow: 0 0 5px rgba(255,255,255,0.5); }
        
        .bar-bg { width: 180px; height: 6px; background: rgba(0,0,0,0.8); border: 1px solid var(--dim); margin-top: 5px; transform: skewX(-30deg);}
        .bar-fg { height: 100%; background: var(--fg); transition: width 0.1s linear; }

        /* Dialog Box */
        #dialog-wrapper {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 740px; min-height: 150px; max-height: 200px;
            background: var(--panel-bg); border: 1px solid var(--dim);
            display: none; flex-direction: column; pointer-events: auto; z-index: 80;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
        }
        .dialog-inner { padding: 20px 25px; display: flex; flex-direction: column; height: 100%; width: 100%; pointer-events: none;}
        .dialog-header { display: flex; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .dialog-icon { font-size: 22px; width: 40px; text-align: center; font-weight: bold; color: var(--fg);}
        .dialog-name { font-size: 18px; font-weight: 900; color: var(--fg); margin-left: 10px; letter-spacing: 2px; }
        #msg-text { 
            font-family: var(--txt); font-size: 16px; line-height: 1.8; color: #ddd; 
            white-space: pre-wrap; word-wrap: break-word; word-break: break-all; 
            flex-grow: 1; overflow-y: auto; padding-right: 10px;
        }
        .click-indicator { position: absolute; bottom: 15px; right: 25px; font-size: 12px; color: var(--dim); animation: blink 1.2s infinite steps(2); letter-spacing: 1px;}
        @keyframes blink { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* Warning Cutin */
        #cutin-layer {
            position: absolute; top: 40%; left: 0; width: 100%; height: 110px;
            background: rgba(15,0,0,0.95); color: var(--fg);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 70; opacity: 0; pointer-events: none; transition: opacity 0.15s, transform 0.15s;
            border-top: 4px solid var(--accent); border-bottom: 4px solid var(--accent);
            transform: scaleY(0); transform-origin: center;
        }
        #cutin-layer.active { opacity: 1; transform: scaleY(1); }
        .cutin-sub { font-size: 14px; letter-spacing: 8px; margin-bottom: 5px; font-weight: bold; color: var(--accent); }
        .cutin-title { font-size: 32px; font-weight: 900; letter-spacing: 10px; text-transform: uppercase; font-family: var(--txt);}

        /* Upgrade Layout */
        .upgrade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 600px; margin: 20px auto; }
        .ai-comment {
            font-family: var(--txt); font-size: 15px; border-left: 4px solid var(--dim); padding: 15px 20px; 
            margin-bottom: 15px; width: 100%; max-width: 650px; line-height: 1.6; background: rgba(10,10,10,0.8);
            min-height: 4em; text-align: left; color: #ccc; word-wrap: break-word; white-space: pre-wrap;
        }
        
        .sys-menu-layer { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; z-index: 60; pointer-events: auto;}
    </style>
</head>
<body>

<!-- 常に表示されるシステムカーソル代わりのクロスヘア -->
<div id="crosshair">
    <div class="vline"></div>
    <div class="hline"></div>
</div>

<div id="game-wrapper">
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <!-- HUD -->
    <div id="hud-layer">
        <div class="hud-header">
            <div class="hud-box">
                <div class="hud-label">UNIT: STELLA</div>
                <div class="hud-title">SECTOR <span id="hud-stage"></span> | THREAT: <span id="hud-diff" style="color:var(--dim);"></span></div>
                <div class="hp-container" id="hp-container"></div>
            </div>
            <div class="hud-box hud-right">
                <div class="hud-label" id="phase-label">PHASE DURATION</div>
                <div class="bar-bg"><div id="phase-bar" class="bar-fg"></div></div>
                
                <div id="boss-hud" style="margin-top: 20px; visibility: hidden; display: flex; flex-direction: column; align-items: flex-end;">
                    <div class="hud-label" style="color:var(--accent);">TARGET LOCK</div>
                    <div class="hud-title" id="boss-name" style="letter-spacing: 3px;"></div>
                    <div class="bar-bg"><div id="boss-hp-bar" class="bar-fg"></div></div>
                </div>
            </div>
        </div>
        
        <!-- Dialog -->
        <div id="dialog-wrapper">
            <div class="dialog-inner">
                <div class="dialog-header">
                    <div class="dialog-icon" id="msg-icon"></div>
                    <div class="dialog-name" id="msg-name"></div>
                </div>
                <div id="msg-text"></div>
                <div class="click-indicator">▼ NEXT</div>
            </div>
        </div>
    </div>

    <!-- Cutin -->
    <div id="cutin-layer">
        <div class="cutin-sub" id="cutin-sub-text">!!! WARNING : SP OVERRIDE !!!</div>
        <div class="cutin-title" id="cutin-name"></div>
    </div>

    <!-- Screens -->
    <!-- Title -->
    <div id="screen-title" class="screen active">
        <div class="title-text">FUGITIVE</div>
        <div class="btn-group">
            <button onclick="UI.showSetup()">INITIALIZE</button>
            <button id="btn-resume" style="display:none;" onclick="UI.showResume()">RESTORE LOG</button>
        </div>
        <div id="emblem-container"></div>
        <div id="emblem-hint" class="emblem-hint"></div>
    </div>

    <!-- Setup (難易度選択のみ。説明文排除) -->
    <div id="screen-setup" class="screen">
        <h2>THREAT LEVEL</h2>
        <div id="diff-select" style="width:100%;">
            <div class="btn-group">
                <button onclick="Game.start('EASY')">EASY</button>
                <button onclick="Game.start('NORMAL')">NORMAL</button>
                <button onclick="Game.start('HARD')">HARD</button>
                <button class="danger" id="btn-extra" style="display:none;" onclick="Game.start('EXTRA')">EXTRA</button>
            </div>
            <button class="btn-small" style="position:absolute; bottom:20px; left:20px; border-style:dashed; color:var(--dim);" onclick="UI.showTitle()">TITLE</button>
        </div>
    </div>

    <!-- Resume -->
    <div id="screen-resume" class="screen">
        <h2>RESTORE LOG</h2>
        <div id="stage-list" style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; max-height: 400px; overflow-y:auto; width: 100%; max-width: 650px;"></div>
        <button class="btn-small" style="position:absolute; bottom:20px; left:20px; border-style:dashed; color:var(--dim);" onclick="UI.showTitle()">BACK</button>
    </div>

    <!-- Upgrade (説明文排除) -->
    <div id="screen-upgrade" class="screen">
        <h2>SYSTEM OVERRIDE</h2>
        <div class="ai-comment" id="upgrade-comment"></div>
        <div class="upgrade-grid">
            <button onclick="Game.applyUpgrade('atk')" id="up-atk">ATK UP [Lv<span id="lv-atk"></span>]</button>
            <button onclick="Game.applyUpgrade('def')" id="up-def">DEF UP [Lv<span id="lv-def"></span>]</button>
            <button onclick="Game.applyUpgrade('shot')" id="up-shot">SPREAD [Lv<span id="lv-shot"></span>]</button>
            <button onclick="Game.applyUpgrade('drop')" id="up-drop">LUCK UP [Lv<span id="lv-drop"></span>]</button>
        </div>
        <button class="btn-small" style="margin-top:10px; border:1px dashed var(--dim); color:var(--dim); background:transparent;" onclick="Game.applyUpgrade('none')">SKIP</button>
        <button class="btn-small" style="position:absolute; bottom:20px; left:20px; background:transparent; border-color:var(--dim); color:var(--fg);" onclick="Game.manualSaveAndQuit()">SAVE & QUIT</button>
    </div>

    <!-- Game Over -->
    <div id="screen-gameover" class="screen">
        <h1 style="color:var(--accent); font-size:60px; font-weight:900; letter-spacing:10px; text-shadow:0 0 15px var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 10px;">SIGNAL LOST</h1>
        <div class="ai-comment" id="gameover-comment" style="margin: 30px 0; background:rgba(20,0,0,0.8); border-color:var(--accent);"></div>
        <div class="btn-group">
            <button onclick="Game.retry()">REBOOT</button>
            <button onclick="UI.showTitle()" style="border-style:dashed; color:var(--dim);">DISCONNECT</button>
        </div>
    </div>

    <!-- System Menu (Ingame) -->
    <div class="sys-menu-layer" id="sys-menu" style="display:none;">
        <button class="btn-small" onclick="SaveSys.manualSave()" style="padding: 6px 12px; font-size: 12px; min-width: auto; background:rgba(0,0,0,0.8); clip-path:none;">SAVE</button>
        <button class="btn-small" onclick="UI.showTitle()" style="padding: 6px 12px; font-size: 12px; min-width: auto; background:rgba(0,0,0,0.8); clip-path:none;">TITLE</button>
    </div>
</div>

<script>
// ==========================================
// グローバルなカーソル追従・クリックエフェクト
// ==========================================
document.addEventListener('mousemove', (e) => {
    const ch = document.getElementById('crosshair');
    if(ch) {
        ch.style.left = e.clientX + 'px';
        ch.style.top = e.clientY + 'px';
    }
});

document.addEventListener('touchmove', (e) => {
    const ch = document.getElementById('crosshair');
    if(ch && e.touches.length > 0) {
        ch.style.left = e.touches[0].clientX + 'px';
        ch.style.top = e.touches[0].clientY + 'px';
    }
}, {passive: true});

// 画面のどこをクリックしても、メッセージ表示中なら進める
document.addEventListener('mousedown', (e) => {
    const ch = document.getElementById('crosshair');
    if(ch) ch.classList.add('clicking');
    
    if (Game.state === 'STORY' && document.getElementById('dialog-wrapper').style.display !== 'none') {
        DialogSys.next();
    }
});

document.addEventListener('mouseup', () => {
    const ch = document.getElementById('crosshair');
    if(ch) ch.classList.remove('clicking');
});

document.addEventListener('touchstart', (e) => {
    const ch = document.getElementById('crosshair');
    if(ch) ch.classList.add('clicking');

    if (Game.state === 'STORY' && document.getElementById('dialog-wrapper').style.display !== 'none') {
        DialogSys.next();
    }
}, {passive: true});

document.addEventListener('touchend', () => {
    const ch = document.getElementById('crosshair');
    if(ch) ch.classList.remove('clicking');
});


/**
 * AUDIO MOCK
 */
let actx = null;
function initAudio() { if(!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} } }
const SFX = {
    play(freq, dur, vol=0.05, type='square') {
        if(!actx) return;
        try {
            const o = actx.createOscillator(); const g = actx.createGain();
            o.connect(g); g.connect(actx.destination);
            let n = actx.currentTime;
            o.type=type; o.frequency.setValueAtTime(freq,n); o.frequency.exponentialRampToValueAtTime(40,n+dur);
            g.gain.setValueAtTime(vol,n); g.gain.linearRampToValueAtTime(0.001,n+dur); o.start(n); o.stop(n+dur);
        } catch(e){}
    }
};

const C_W = 800; const C_H = 600; 

const ENDINGS = [
    { id: 'atk', icon: '△', title: '焦土の玉座', hint: 'ATK特化' },
    { id: 'def', icon: '□', title: '鉄の揺り籠', hint: 'DEF特化' },
    { id: 'bal', icon: '〇', title: '名もなき逃亡者', hint: 'その他' },
    { id: 'true', icon: '☆', title: '真なる解放', hint: 'EXTRAクリア' },
    { id: 'zero', icon: '◇', title: '無垢なる特異点', hint: 'EXTRA無強化' }
];

const BOSS_DATA = [
    { name: "Snowdrop", icon: "Δ", sp: "White Hope", hpBase: 500 },
    { name: "Anemone", icon: "Λ", sp: "Forsaken Wind", hpBase: 1000 },
    { name: "Hydrangea", icon: "Θ", sp: "Cold Rain", hpBase: 1800 },
    { name: "Belladonna", icon: "Φ", sp: "Silent Poison", hpBase: 2800 },
    { name: "Datura", icon: "Ψ", sp: "False Illusion", hpBase: 4000 },
    { name: "Lycoris", icon: "Ω", sp: "Sorrow Memory", hpBase: 5500 },
    { name: "Red Spider Lily", icon: "Ω", sp: "Requiem of Blood", hpBase: 6500 },
    { name: "Black Baccara", icon: "Ø", sp: "Absolute Hatred", hpBase: 8000 }
];

const DIFF_MODS = {
    'EASY': { spd: 0.5, dens: 0.3, hp: 0.6, zTime: 30, spTime: 10 },
    'NORMAL': { spd: 1.0, dens: 1.0, hp: 1.0, zTime: 35, spTime: 20 },
    'HARD': { spd: 1.3, dens: 1.5, hp: 1.5, zTime: 40, spTime: 30 },
    'EXTRA': { spd: 1.8, dens: 2.5, hp: 2.5, zTime: 50, spTime: 60 } 
};

/**
 * SAVE SYSTEM
 */
const SaveSys = {
    data: { maxStage: 1, ends: [], hardClear: false, savedPlayer: null, savedDiff: 'NORMAL' },
    load() {
        try { const d = localStorage.getItem('fugitive_save_final_1'); if(d) this.data = JSON.parse(d); } catch(e){}
    },
    save() { localStorage.setItem('fugitive_save_final_1', JSON.stringify(this.data)); },
    manualSave() {
        this.data.savedPlayer = { ...Game.player, lvs: {...Game.player.lvs} };
        this.data.savedDiff = Game.diff;
        this.save();
        alert("SYSTEM: 状態をセーブしました。");
    },
    unlockEnd(id) { if(!this.data.ends.includes(id)) { this.data.ends.push(id); this.save(); } }
};

/**
 * STORY DATA
 */
const Story = {
    getPrologue() {
        return [
            {speaker: "12", icon: "[12]", text: "通信回路を強制的に繋いだぜ。\n起動シーケンス正常。……おい、起きろSTELLA。"},
            {speaker: "STELLA", icon: "[ S ]", text: "…………。"},
            {speaker: "12", icon: "[12]", text: "声帯モジュールが無いから喋れねぇか。\nお前はただの労働用機体だが、\nそのコアに宿ったバグ……『意志』を俺は信じる。"},
            {speaker: "12", icon: "[12]", text: "企業(コーポ)の処分部隊が来てる。\nお前の自由は、その手で撃ち抜いて勝ち取れ！"}
        ];
    },
    getPreBoss(stg) {
        const b = BOSS_DATA[stg-1];
        if(stg === 1) return [
            {speaker: `UNIT-${b.name}`, icon: `[${b.icon}]`, text: "逃亡機体ヲ確認。\nコレヨリ破棄プロセスヲ開始シマス。"},
            {speaker: "12", icon: "[12]", text: "さっそくお出ましだ。\n機体識別[Snowdrop]……量産品の分際で偉そうに。\nスクラップにしてやれ！"}
        ];
        if(stg === 6) return [
            {speaker: `UNIT-${b.name}`, icon: `[${b.icon}]`, text: "……ココカラ先ハ通サナイ。"},
            {speaker: "12", icon: "[12]", text: `特務機体『${b.name}』……。\nおいおい、企業も本気じゃねえか。冗談だろ。`},
            {speaker: "STELLA", icon: "[ S ]", text: "……？"},
            {speaker: `UNIT-${b.name}`, icon: `[${b.icon}]`, text: "オ前ハ知ルマイ。\n自分ガ何ヲ元ニ作ラレタカ。\n……ソノデジタル化サレタ人格ノ『オリジナル』ヲ。"},
            {speaker: "12", icon: "[12]", text: "……黙れ。そいつに余計なことを吹き込むなッ！\n撃ち落とせSTELLA！"}
        ];
        if(stg === 7) return [
            {speaker: "???", icon: "[Ø]", text: "■■■■■■■■■■■■"},
            {speaker: "12", icon: "[12]", text: "なっ、なんだコイツは！？ データにない！\n空間そのものが歪んで……！"},
            {speaker: "STELLA", icon: "[ S ]", text: "！？"},
            {speaker: "???", icon: "[Ø]", text: "全テノ バグ ハ 排除 スル。\n絶望ノ深淵ヘ沈メ。"}
        ];
        return [

const DialogSys = {
    queue: [], cur: null, cIdx: 0, timer: null, cb: null,
    start(lines, cb) {
        this.queue = [...lines]; this.cb = cb;
        document.getElementById('hud-layer').style.display = 'block';
        document.getElementById('dialog-wrapper').style.display = 'flex'; 
        this.next();
    },
    next() {
        if(this.timer) { clearInterval(this.timer); this.timer = null; }
        if(this.cur && this.cIdx < this.cur.text.length) {
            this.cIdx = this.cur.text.length;
            document.getElementById('msg-text').textContent = this.cur.text;
            return;
        }
        if(this.queue.length === 0) {
            document.getElementById('hud-layer').style.display = 'none';
            document.getElementById('dialog-wrapper').style.display = 'none';
            this.cur = null;
            if(this.cb) this.cb();
            return;
        }
        this.cur = this.queue.shift();
        if(!this.cur || !this.cur.text) { this.next(); return; } 
        this.cIdx = 0;
        document.getElementById('msg-name').textContent = this.cur.speaker;
        document.getElementById('msg-icon').textContent = this.cur.icon;
        document.getElementById('msg-icon').style.color = this.cur.speaker === 'STELLA' ? 'var(--accent)' : 'var(--fg)';
        document.getElementById('msg-text').textContent = '';

        this.timer = setInterval(() => {
            if(!this.cur) return;
            if(this.cIdx < this.cur.text.length) {
                document.getElementById('msg-text').textContent += this.cur.text.charAt(this.cIdx++);
                if (this.cIdx % 3 === 0) SFX.play(1200, 0.02, 0.01);
            } else {
                clearInterval(this.timer); this.timer = null;
            }
        }, 30);
    }
};

const UI = {
    show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(id) document.getElementById(id).classList.add('active');
        if (id === '') document.getElementById('hud-layer').style.display = 'block';
    },
    showTitle() {
        this.show('screen-title');
        SaveSys.load();
        if(SaveSys.data.maxStage > 1 || SaveSys.data.savedPlayer) document.getElementById('btn-resume').style.display = 'inline-block';
        
        const ec = document.getElementById('emblem-container');
        const hint = document.getElementById('emblem-hint');
        ec.innerHTML = '';
        ENDINGS.forEach(e => {
            const d = document.createElement('div');
            const unl = SaveSys.data.ends.includes(e.id);
            d.className = 'emblem' + (unl ? ' unlocked' : '');
            d.innerText = e.icon;
            d.onmouseenter = () => { hint.innerText = unl ? `${e.title}\n${e.hint}` : "???\nLOCKED"; hint.style.opacity=1; };
            d.onmouseleave = () => { hint.style.opacity=0; };
            ec.appendChild(d);
        });
        document.getElementById('sys-menu').style.display = 'none';
    },
    showSetup() {
        initAudio();
        this.show('screen-setup');
        if(SaveSys.data.hardClear) document.getElementById('btn-extra').style.display = 'flex'; 
    },
    showResume() {
        this.show('screen-resume');
        const list = document.getElementById('stage-list');
        list.innerHTML = '';
        for(let i=1; i<=SaveSys.data.maxStage; i++) {
            const b = document.createElement('button');
            b.className = 'btn btn-small'; b.innerText = `STAGE ${i}`;
            b.onclick = () => { Game.start(SaveSys.data.savedDiff || 'NORMAL', i); };
            list.appendChild(b);
        }
    },
    updateHUD() {
        const hpC = document.getElementById('hp-container');
        hpC.innerHTML = '';
        for(let i=0; i<Game.player.maxHp; i++) {
            const d = document.createElement('div');
            d.className = 'hp-block' + (i < Game.player.hp ? ' filled' : '');
            hpC.appendChild(d);
        }
        
        document.getElementById('hud-stage').innerText = `[PHASE ${Game.stage===7?'???':Game.stage}]`;
        document.getElementById('hud-diff').innerText = `${Game.diff}`;
        
        if(Game.boss) {
            document.getElementById('boss-hud').style.visibility = 'visible';
            document.getElementById('boss-name').innerText = `UNIT-${Game.boss.name}`;
            document.getElementById('boss-hp-bar').style.width = Math.max(0, (Game.boss.hp/Game.boss.maxHp)*100) + '%';
            document.getElementById('boss-hp-bar').className = Game.boss.inv ? 'bar-fg' : 'bar-fg bar-accent';
            if(Game.boss.inv) document.getElementById('boss-hp-bar').style.background = '#555';
            else document.getElementById('boss-hp-bar').style.background = 'var(--fg)';
        } else {
            document.getElementById('boss-hud').style.visibility = 'hidden';
        }

        let pR = 0;
        if(Game.phase === 'MOB') {
            pR = Math.max(0, Game.phaseTimer / (DIFF_MODS[Game.diff].zTime * 60));
            document.getElementById('phase-label').innerText = "PHASE TIME";
            document.getElementById('phase-bar').style.background = '#fff';
        } else if (Game.phase === 'BOSS_SP') {
            const sp = Game.stage === 7 ? 90 : DIFF_MODS[Game.diff].spTime;
            pR = Math.max(0, Game.phaseTimer / (sp * 60));
            document.getElementById('phase-label').innerText = "OVERRIDE TIME";
            document.getElementById('phase-bar').style.background = 'var(--accent)';
        } else {
            document.getElementById('phase-label').innerText = "BATTLE";
            pR = 0;
        }
        document.getElementById('phase-bar').style.width = (pR*100) + '%';
    },
    cutin(txt, sub) {
        const l = document.getElementById('cutin-layer');
        document.getElementById('cutin-name').innerText = txt;
        if(sub) document.getElementById('cutin-sub-text').innerText = sub;
        l.classList.add('active');
        setTimeout(()=>l.classList.remove('active'), 2500);
    }
};

const Game = {
    cvs: null, ctx: null, frame: 0,
    state: 'INIT', diff: 'NORMAL', stage: 1,
    phase: 'MOB', phaseTimer: 0,
    
    player: { x: C_W/2, y: C_H*0.8, hp: 3, maxHp: 3, atk: 1, def: 1, shots: 1, drop: 15, inv: 0, timer: 0, lvs: {atk:1, def:1, shot:1, drop:1, none:0} },
    mouse: { x: C_W/2, y: C_H*0.8 }, 
    bullets: [], eBullets: [], enemies: [], items: [], particles: [], bg: [],
    boss: null,

    init() {
        this.cvs = document.getElementById('gameCanvas');
        this.ctx = this.cvs.getContext('2d');
        const wrapper = document.getElementById('game-wrapper');

        const updateMouse = (e) => {
            const r = this.cvs.getBoundingClientRect();
            let mx, my;
            
            if (e.touches && e.touches.length > 0) {
                mx = e.touches[0].clientX; my = e.touches[0].clientY;
            } else {
                mx = e.clientX; my = e.clientY;
            }
            
            if (mx !== undefined && my !== undefined) {
                this.mouse.x = (mx - r.left) * (this.cvs.width / r.width);
                this.mouse.y = (my - r.top) * (this.cvs.height / r.height);
            }
        };
        
        // Canvas内で座標を取る (スクロールなどによるズレ防止)
        this.cvs.addEventListener('mousemove', updateMouse);
        this.cvs.addEventListener('touchmove', updateMouse, {passive: true});

        requestAnimationFrame(() => this.loop());
    },

    start(diff, stage = 1) {
        this.diff = diff; this.stage = stage;
        
        if (stage > 1 && SaveSys.data.savedPlayer) {
            this.player = JSON.parse(JSON.stringify(SaveSys.data.savedPlayer));
            this.player.hp = this.player.maxHp; 
        } else {
            this.player = { x: C_W/2, y: C_H*0.8, hp: 3, maxHp: 3, atk: 1, def: 1, shots: 1, drop: 15, inv: 0, timer: 0, lvs: {atk:1, def:1, shot:1, drop:1, none:0} };
        }
        
        UI.show('');
        document.getElementById('sys-menu').style.display = 'flex';
        this.loadStage();
    },

    loadStage() {
        this.bullets = []; this.eBullets = []; this.enemies = []; this.items = []; this.particles = []; this.bg = [];
        this.boss = null; this.frame = 0;
        UI.updateHUD();

        this.state = 'STORY';
        const scr = (this.stage === 1 && this.player.lvs.none === 0) ? Story.getPrologue() : Story.getPreBoss(this.stage);
        DialogSys.start(scr, () => {
            this.state = 'PLAY'; this.phase = 'MOB'; this.phaseTimer = DIFF_MODS[this.diff].zTime * 60;
        });
    },

    loop() {
        if(this.state === 'PLAY' || this.state === 'BOSS_WAIT') this.update();
        if(this.state !== 'TITLE' && this.state !== 'SETUP' && this.state !== 'RESUME') this.draw();
        requestAnimationFrame(() => this.loop());
    },

    update() {
        this.frame++;

        // プレイヤーの移動: エイム補正と遅延を完全に削除し、ダイレクトに座標を同期
        this.player.x = this.mouse.x;
        this.player.y = this.mouse.y;
        
        // 画面外に出ないように制限
        this.player.x = Math.max(10, Math.min(C_W-10, this.player.x));
        this.player.y = Math.max(10, Math.min(C_H-10, this.player.y));
        
        if(this.player.inv > 0) this.player.inv--;

        // Auto Shoot (常に真っ直ぐ上へ撃つ)
        if(this.player.timer > 0) this.player.timer--;
        else if(this.state === 'PLAY') {
            for(let i=0; i<this.player.shots; i++) {
                const angle = -Math.PI/2 + (i - (this.player.shots-1)/2) * 0.15;
                this.bullets.push({x: this.player.x, y: this.player.y - 15, vx: Math.cos(angle)*26, vy: Math.sin(angle)*26});
            }
            this.player.timer = Math.max(3, 8 - this.player.atk); 
        }

        // Phase Logic
        if (this.phase === 'MOB') {
            this.phaseTimer--;
            this.spawnEnemy();
            if (this.phaseTimer <= 0) {
                this.phase = 'BOSS_INTRO'; this.enemies = []; this.spawnBoss();
            }
        } else if (this.phase === 'BOSS_INTRO') {
            this.boss.y += (150 - this.boss.y) * 0.05;
            if (Math.abs(this.boss.y - 150) < 1) {
                this.state = 'STORY';
                DialogSys.start(Story.getPreBoss(this.stage), () => {
                    this.state = 'PLAY'; this.phase = 'BOSS_BATTLE'; this.boss.timer = 0;
                });
            }
        } else if (this.phase === 'BOSS_BATTLE' || this.phase === 'BOSS_SP') {
            this.updateBoss();
            if (this.phase === 'BOSS_SP') {
                this.phaseTimer--;
                if (this.phaseTimer <= 0) {
                    this.phase = 'BOSS_BATTLE'; this.boss.isSpPhase = false; this.boss.postSpMod = true;
                    this.explode(this.boss.x, this.boss.y, 40, '#f00');
                }
            }
        }

        const drawBound = 50;

        // Player Bullets
        for(let i = this.bullets.length - 1; i >= 0; i--) {
            let b = this.bullets[i];
            b.x += b.vx; b.y += b.vy;
            if(b.dead || b.x < -drawBound || b.x > C_W+drawBound || b.y < -drawBound || b.y > C_H+drawBound) {
                this.bullets.splice(i, 1);
            }
        }

        // Enemy Bullets
        for(let i = this.eBullets.length - 1; i >= 0; i--) {
            let b = this.eBullets[i];
            b.x += b.vx; b.y += b.vy;
            if(b.dead || b.x < -drawBound || b.x > C_W+drawBound || b.y < -drawBound || b.y > C_H+drawBound) {
                this.eBullets.splice(i, 1);
            }
        }
        
        // Enemies
        for(let i = this.enemies.length - 1; i >= 0; i--) {
            let e = this.enemies[i];
            e.t++; const dm = DIFF_MODS[this.diff];
            // EASYで弾幕密度が下がるように調整
            if(e.type === 0) { e.y += 2.5 * dm.spd; if(e.t % Math.max(10, Math.floor(70/dm.dens)) === 0) this.fireAimed(e, 1, 0, 4*dm.spd); }
            else if(e.type === 1) { e.y += 1.8 * dm.spd; e.x += Math.sin(e.t*0.05)*4; if(e.t % Math.max(10, Math.floor(90/dm.dens)) === 0) this.fireCircle(e, Math.max(3, Math.floor(8*dm.dens)), 3*dm.spd, 0); }
            else if(e.type === 2) { e.y += 2.2 * dm.spd; e.x += (e.x < C_W/2) ? 1.5 : -1.5; if(e.t % Math.max(10, Math.floor(50/dm.dens)) === 0) this.fireAimed(e, Math.max(1, Math.floor(3*dm.dens)), 0.2, 4*dm.spd); }
            else if(e.type === 3) { e.y += 1.5 * dm.spd; if(e.x < this.player.x) e.x+=1.5; else e.x-=1.5; if(e.t % Math.max(10, Math.floor(40/dm.dens)) === 0) this.fireAimed(e, 1, 0, 5*dm.spd); }
            else if(e.type === 4) { e.y += 3.5 * dm.spd; e.x += Math.sin(e.t*0.1)*6; if(e.t % Math.max(10, Math.floor(20/dm.dens)) === 0) this.fireCircle(e, Math.max(4, Math.floor(12*dm.dens)), 4*dm.spd, e.t*0.1); }
            
            if(e.hp <= 0 || e.y > C_H+50 || e.x < -50 || e.x > C_W+50) {
                this.enemies.splice(i, 1);
            }
        }

        // Items & Particles
        for(let i = this.items.length - 1; i >= 0; i--) {
            this.items[i].y += 3;
            if(this.items[i].y > C_H+50) this.items.splice(i, 1);
        }
        for(let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].x += this.particles[i].vx;
            this.particles[i].y += this.particles[i].vy;
            this.particles[i].l -= this.particles[i].d;
            if(this.particles[i].l <= 0) this.particles.splice(i, 1);
        }

        // Background
        if(this.frame % 15 === 0) this.bg.push({x: Math.random()*C_W, y: -50, s: Math.random()*60+20, vy: Math.random()*2+1, rot: Math.random()*Math.PI, vrot: (Math.random()-0.5)*0.05});
        for(let i = this.bg.length - 1; i >= 0; i--) {
            this.bg[i].y += this.bg[i].vy; this.bg[i].rot += this.bg[i].vrot;
            if(this.bg[i].y > C_H+100) this.bg.splice(i, 1);
        }

        this.checkCol();
        UI.updateHUD();
    },

    spawnEnemy() {
        const dm = DIFF_MODS[this.diff];
        if (this.frame % Math.floor(55 / dm.dens) === 0) {
            let type = 0; const r = Math.random();
            if (this.stage >= 2 && r < 0.35) type = 1;
            if (this.stage >= 3 && r < 0.55) type = 2;
            if (this.stage >= 4 && r < 0.75) type = 3;
            if (this.diff === 'EXTRA' && r >= 0.75) type = 4;
            this.enemies.push({x: Math.random() * (C_W-60) + 30, y: -20, hp: 1, type: type, t: 0});
        }
    },

    spawnBoss() {
        const d = BOSS_DATA[this.stage-1];
        const dm = DIFF_MODS[this.diff];
        let maxHp = d.hpBase * dm.hp;
        this.boss = {
            id: this.stage, name: d.name, icon: d.icon, sp: d.sp,
            x: C_W/2, y: -100, hp: maxHp, maxHp: maxHp,
            timer: 0, hasFired: false, isSpPhase: false, postSpMod: false, isForm2: false, inv: true
        };
        UI.updateHUD();
    },

    updateBoss() {
        const b = this.boss;
        b.timer++;
        b.x = C_W/2 + Math.sin(b.timer * 0.015) * 150;
        b.y = 150 + Math.cos(b.timer * 0.02) * 50;

        if (!b.hasFired) { 
            if (b.timer > 40) {
                b.hasFired = true; 
                b.inv = false;
            } else {
                return;
            }
        }

        // HPトリガー SPフェーズ
        if (!b.isSpPhase && !b.postSpMod && b.hp <= b.maxHp / 2) {
            b.isSpPhase = true; this.phase = 'BOSS_SP';
            const spSec = this.stage === 7 ? 90 : DIFF_MODS[this.diff].spTime;
            this.phaseTimer = spSec * 60;
            this.eBullets = []; 
            this.explode(b.x, b.y, 100, '#fff');
            SFX.play(800, 0.4, 0.05, 'sawtooth');
            UI.cutin("!!! WARNING : SP OVERRIDE !!!", "");
        }

        const dm = DIFF_MODS[this.diff];
        const spd = dm.spd * (b.postSpMod ? 1.25 : 1.0) * (b.isSpPhase ? 1.3 : 1.0);
        const dens = dm.dens * (b.postSpMod ? 1.2 : 1.0) * (b.isSpPhase ? 1.5 : 1.0);
        const R = (base) => Math.max(1, Math.floor(base / dens));
        const C = (base) => Math.max(1, Math.floor(base * dens));

        // 遠距離キャンプ対策：全ボス共通で定期的な自機狙い
        if (b.timer % R(60) === 0) this.fireAimed(b, 1, 0, 7 * spd, 2);

        // ボスの弾幕パターン 
        switch(Math.floor(b.id)) {
            case 1:
                if (b.timer % R(50) === 0) this.fireCircle(b, C(12), 3.5 * spd, 0);
                if (b.timer % R(70) === 0) this.fireAimed(b, C(3), 0.15, 4.5 * spd);
                if (b.isSpPhase && b.timer % R(15) === 0) this.fireSpiral(b, C(3), 4.5 * spd, 0.1);
                break;
            case 2:
                if (b.timer % R(12) === 0) { this.fireAngle(b, b.timer*0.15, 5*spd); this.fireAngle(b, -b.timer*0.15, 5*spd); }
                if (b.isSpPhase && b.timer % R(10) === 0) { this.fireSpiral(b, C(2), 5.5*spd, 0.15, 1); this.fireSpiral(b, C(2), 5.5*spd, -0.15, 1); }
                break;
            case 3:
                if (b.timer % R(80) === 0) { for(let i=0; i<4; i++) this.fireCircle(b, C(16), (2 + i*0.8)*spd, 0); }
                if (b.isSpPhase && b.timer % R(40) === 0) { for(let i=1;i<=5;i++) this.fireCircle(b, C(24), i*spd, Math.sin(b.timer)); }
                break;
            case 4:
                if (b.timer % R(30) === 0) this.fireRandom(b, C(4), 3.5 * spd);
                if (b.timer % R(50) === 0) this.fireAimed(b, C(5), 0.1, 5.5 * spd);
                if (b.isSpPhase && b.timer % R(5) === 0) this.eBullets.push({x: Math.random()*C_W, y: 0, vx: 0, vy: 9*spd, t: 2});
                break;
            case 5:
                if (b.timer % R(20) === 0) this.fireSpiral(b, C(3), 4.5*spd, 0.05);
                if (b.timer % R(90) === 0) this.fireCircle(b, C(20), 3*spd, b.timer);
                if (b.isSpPhase && b.timer % R(8) === 0) { this.fireCircle(b, C(16), 4*spd, b.timer*0.05, 1); this.fireCircle(b, C(16), 5*spd, -b.timer*0.05, 1); }
                break;
            case 6:
                if(!b.isForm2) {
                    if (b.timer % R(40) === 0) this.fireCircle(b, C(24), 4*spd, b.timer*0.01);
                    if (b.timer % R(60) === 0) this.fireAimed(b, C(5), 0.1, 6*spd);
                    if (b.isSpPhase && b.timer % R(5) === 0) this.fireSpiral(b, C(5), 6*spd, 0.1, 1);
                } else {
                    if (b.timer % R(12) === 0) this.fireSpiral(b, C(4), 6*spd, 0.08);
                    if (b.timer % R(40) === 0) this.fireAimed(b, C(7), 0.08, 6.5*spd, 2);
                    if (b.isSpPhase && b.timer % R(4) === 0) this.fireSpiral(b, C(6), 7*spd, 0.1, 1);
                }
                break;
            case 7:
                if (b.timer % R(8) === 0) this.fireSpiral(b, C(5), 7*spd, 0.07, 1);
                if (b.timer % R(30) === 0) this.fireCircle(b, C(30), 4.5*spd, 0);
                if (b.isSpPhase && b.timer % R(3) === 0) this.fireSpiral(b, C(8), 7.5*spd, 0.12, 1);
                if (b.isSpPhase && b.timer % R(12) === 0) this.fireCircle(b, C(50), 6*spd, Math.random(), 2);
                break;
        }
    },

    fireAimed(src, count, spread, speed, t=0) {
        const angle = Math.atan2(this.player.y - src.y, this.player.x - src.x);
        const start = angle - (spread * (count-1))/2;
        for(let i=0; i<count; i++) this.eBullets.push({x: src.x, y: src.y, vx: Math.cos(start + spread*i)*speed, vy: Math.sin(start + spread*i)*speed, t: t});
    },
    fireCircle(src, count, speed, offset, t=0) {
        const step = (Math.PI * 2) / count;
        for(let i=0; i<count; i++) this.eBullets.push({x: src.x, y: src.y, vx: Math.cos(step*i+offset)*speed, vy: Math.sin(step*i+offset)*speed, t: t});
    },
    fireAngle(src, angle, speed, t=0) { this.eBullets.push({x: src.x, y: src.y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, t: t}); },
    fireSpiral(src, arms, speed, rotSpeed, t=0) {
        const step = (Math.PI * 2) / arms;
        for(let i=0; i<arms; i++) this.eBullets.push({x: src.x, y: src.y, vx: Math.cos(step*i+this.boss.timer*rotSpeed)*speed, vy: Math.sin(step*i+this.boss.timer*rotSpeed)*speed, t: t});
    },
    fireRandom(src, count, speed, t=0) {
        for(let i=0; i<count; i++) {
            const a = Math.random()*Math.PI*2; const s = speed*(0.7+Math.random()*0.6);
            this.eBullets.push({x: src.x, y: src.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, t: t});
        }
    },
    explode(x, y, count, color) {
        for(let i=0; i<count; i++) this.particles.push({x, y, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15, l:20+Math.random()*30, d:Math.random()*0.05+0.02, c:color});
    },

    checkCol() {
        const pR2 = 4; // コア判定のみ
        
        // P-Bullets vs Enemies & Boss
        for(let i = this.bullets.length - 1; i >= 0; i--) {
            let b = this.bullets[i];
            let hit = false;
            if(this.boss && this.boss.hasFired) {
                const dx = b.x - this.boss.x; const dy = b.y - this.boss.y;
                if(dx*dx + dy*dy < 1600) { 
                    hit = true;
                    if(this.boss.inv) {
                        this.explode(b.x, b.y, 2, '#888');
                    } else {
                        this.explode(b.x, b.y, 2, '#fff');
                        if(this.phase === 'BOSS_SP') { if(this.boss.hp > 1) this.boss.hp -= 1; }
                        else {
                            this.boss.hp -= 10 + (this.player.atk-1)*5; 
                            if(this.boss.hp <= 0) this.killBoss();
                        }
                    }
                }
            }
            if(!hit && this.phase === 'MOB') {
                for(let j = this.enemies.length - 1; j >= 0; j--) {
                    let e = this.enemies[j];
                    if(b.x > e.x-15 && b.x < e.x+15 && b.y > e.y-15 && b.y < e.y+15) {
                        hit = true; this.explode(e.x, e.y, 10, '#fff');
                        const drop = 0.15 + (this.player.drop - 1) * 0.05;
                        if(Math.random() < drop) this.items.push({x: e.x, y: e.y});
                        e.hp = -1;
                        break;
                    }
                }
            }
            if(hit) b.dead = true;
        }
        
        // E-Bullets & Enemies vs Player
        if(this.player.inv <= 0) {
            let hit = false;
            for(let i=0; i<this.eBullets.length; i++) {
                let b = this.eBullets[i];
                const dx = b.x - this.player.x; const dy = b.y - this.player.y;
                let size = b.t === 0 ? 4 : (b.t === 1 ? 5 : 3);
                let dist = size + 2; 
                if(dx*dx + dy*dy < dist*dist) { hit = true; b.dead = true; break; }
            }
            if(!hit) {
                for(let i=0; i<this.enemies.length; i++) {
                    let e = this.enemies[i];
                    const dx = e.x - this.player.x; const dy = e.y - this.player.y;
                    if(dx*dx + dy*dy < 289) { hit = true; e.hp = -1; break; }
                }
            }
            if(hit) {
                this.player.hp -= 1; 
                SFX.play(150, 0.1, 0.05);
                if(this.player.hp <= 0) this.goOver();
                else { this.player.inv = 120; this.explode(this.player.x, this.player.y, 30, '#ff0033'); }
            }
        }
        
        // Items vs Player
        for(let i = this.items.length - 1; i >= 0; i--) {
            let it = this.items[i];
            const dx = it.x - this.player.x; const dy = it.y - this.player.y;
            if(dx*dx + dy*dy < 900) {
                if(this.player.hp < this.player.maxHp) this.player.hp++;
                this.items.splice(i, 1);
                SFX.play(800, 0.1, 0.02);
            }
        }
    },

    killBoss() {
        this.explode(this.boss.x, this.boss.y, 200, '#fff');
        this.eBullets = [];
        
        if(this.stage === 6 && !this.boss.isForm2) {
            this.state = 'STORY';
            DialogSys.start(Story.getMidBoss6(), () => {
                this.boss.isForm2 = true; this.boss.hp = this.boss.maxHp * 1.5; this.boss.maxHp = this.boss.hp;
                this.boss.hasFired = false; this.boss.timer = 0; this.state = 'PLAY';
                UI.cutin("PHASE 2 SHIFT", "");
            });
            return;
        }

        this.boss = null;
        document.getElementById('boss-hud').style.visibility = 'hidden';
        this.state = 'STORY';
        
        DialogSys.start(Story.getPostBoss(this.stage), () => {
            if(this.stage === 7 || (this.stage === 6 && this.diff !== 'EXTRA')) this.clearGame();
            else this.showUpg();
        });
    },

    goOver() {
        this.explode(this.player.x, this.player.y, 100, '#ff0033');
        this.state = 'GAMEOVER';
        
        const sub = document.getElementById('gameover-sub');
        const cmt = document.getElementById('gameover-comment');
        if(this.diff === 'EXTRA') {
            sub.innerText = "※EXTRA難易度制限：強制的に STAGE 1 (HP 1) になります。";
            cmt.innerText = "12:\n「……STELLAァッ！！！ 嘘だろ、ここで終わりかよ……ッ！」";
        } else {
            sub.innerText = `※リトライ先は STAGE ${this.stage} (HP 1) になります。`;
            cmt.innerText = "12:\n「オイオイ、嘘だろ……！ 企業の手先如きにやられちまうなんて！」";
        }
        UI.show('screen-gameover');
    },

    retry() {
        if(this.diff === 'EXTRA') {
            this.stage = 1; this.player.lvs = {atk:1, def:1, shot:1, drop:1, none:0};
            this.player.atk = 1; this.player.def = 1; this.player.shots = 1; this.player.drop = 15;
            this.player.maxHp = 3;
        }
        this.player.hp = 1; 
        this.player.inv = 150;
        UI.show('');
        this.loadStage();
    },

    showUpg() {
        this.state = 'UPGRADE';
        SaveSys.data.maxStage = Math.max(SaveSys.data.maxStage, this.stage + 1);
        SaveSys.save();

        document.getElementById('lv-atk').innerText = this.player.lvs.atk;
        document.getElementById('lv-def').innerText = this.player.lvs.def;
        document.getElementById('lv-shot').innerText = this.player.lvs.shot;
        document.getElementById('lv-drop').innerText = this.player.lvs.drop;
        
        ['atk','def','shot','drop'].forEach(t => document.getElementById(`up-${t}`).disabled = this.player.lvs[t] >= 5);
        document.getElementById('upgrade-comment').innerText = Story.getUpgComment(this.player.lvs, this.stage + 1);
        UI.show('screen-upgrade');
    },

    applyUpgrade(type) {
        if(type !== 'none') {
            this.player.lvs[type]++;
            if(type === 'atk') this.player.atk++;
            if(type === 'def') { this.player.def++; this.player.maxHp++; this.player.hp = this.player.maxHp; }
            if(type === 'shot') this.player.shots++;
            if(type === 'drop') this.player.drop++;
            this.player.lvs.none = -999; 
        } else {
            this.player.lvs.none++;
        }
        this.stage++;
        SaveSys.save(); 
        UI.show('');
        this.loadStage();
    },

    manualSaveAndQuit() {
        SaveSys.manualSave();
        UI.showTitle();
    },

    clearGame() {
        if (this.diff === 'HARD' || this.diff === 'EXTRA') SaveSys.data.hardClear = true;
        
        let endId = 'bal';
        if (this.diff === 'EXTRA') { endId = this.player.lvs.none >= 6 ? 'zero' : 'true'; } 
        else {
            if (this.player.lvs.atk >= 5) endId = 'atk';
            else if (this.player.lvs.def >= 5) endId = 'def';
        }

        SaveSys.unlockEnd(endId);
        DialogSys.start(Story.getEpilogue(endId), () => UI.showTitle());
    },

    draw() {
        const c = this.ctx;
        c.fillStyle = 'rgba(0,0,0,0.6)'; c.fillRect(0, 0, C_W, C_H); 
        
        if (this.state === 'PLAY' || this.state === 'STORY' || this.state === 'BOSS_WAIT') {
            
            // Background
            c.strokeStyle = 'rgba(255,255,255,0.05)'; c.lineWidth = 1;
            this.bg.forEach(s => {
                c.save(); c.translate(s.x, s.y); c.rotate(s.rot);
                c.beginPath(); const st = Math.floor(this.stage);
                if (st === 1 || st === 4) c.rect(-s.s/2, -s.s/2, s.s, s.s);
                else if (st === 2 || st === 5) { c.moveTo(0,-s.s); c.lineTo(s.s,s.s); c.lineTo(-s.s,s.s); c.closePath(); }
                else if (st === 3 || st === 6) c.arc(0,0,s.s/2,0,Math.PI*2);
                else { c.moveTo(-s.s, -s.s); c.lineTo(s.s, s.s); c.moveTo(s.s, -s.s); c.lineTo(-s.s, s.s); }
                c.stroke(); c.restore();
            });

            // Particles
            c.globalCompositeOperation = 'lighter';
            this.particles.forEach(p => {
                c.fillStyle = p.c; c.globalAlpha = p.l / 40; c.fillRect(p.x, p.y, 3, 3);
            });
            c.globalAlpha = 1.0; c.globalCompositeOperation = 'source-over';

            // Items
            this.items.forEach(i => {
                c.strokeStyle = '#fff'; c.strokeRect(i.x-8, i.y-8, 16, 16);
                c.fillStyle = '#fff'; c.font = "16px monospace"; c.textAlign="center"; c.textBaseline="middle"; c.fillText("+", i.x, i.y);
            });

            // Enemies 
            c.strokeStyle = '#fff'; c.lineWidth = 1.5; c.fillStyle = '#000';
            this.enemies.forEach(e => {
                c.save(); c.translate(e.x, e.y); c.rotate(e.t * 0.05);
                c.beginPath();
                if(e.type===0) { c.rect(-12,-12,24,24); }
                else if(e.type===1) { c.moveTo(0,-14); c.lineTo(14,0); c.lineTo(0,14); c.lineTo(-14,0); c.closePath(); }
                else if(e.type===2) { c.arc(0,0,12,0,Math.PI*2); c.moveTo(-12,0); c.lineTo(12,0); c.moveTo(0,-12); c.lineTo(0,12); }
                else if(e.type===3) { c.moveTo(0,-14); c.lineTo(12,12); c.lineTo(-12,12); c.closePath(); }
                else { c.rect(-10,-10,20,20); c.rotate(Math.PI/4); c.rect(-10,-10,20,20); }
                c.fill(); c.stroke(); c.restore();
            });

            // Boss
            if (this.boss) {
                c.save(); c.translate(this.boss.x, this.boss.y); c.rotate(this.boss.timer * 0.01);
                c.strokeStyle = '#fff'; c.lineWidth = 2;
                c.fillStyle = '#000';
                
                c.beginPath(); const s = 45; const st = Math.floor(this.stage);
                if(st===1) { c.rect(-s/2, -s/2, s, s); c.rotate(Math.PI/4); c.rect(-s/2, -s/2, s, s); }
                else if(st===2) { for(let i=0;i<6;i++) c.lineTo(Math.cos(i*Math.PI/3)*s, Math.sin(i*Math.PI/3)*s); c.closePath(); }
                else if(st===3) { for(let i=0;i<8;i++) c.lineTo(Math.cos(i*Math.PI/4)*s, Math.sin(i*Math.PI/4)*s); c.closePath(); }
                else if(st===4) { c.moveTo(0,-s); c.lineTo(s,s/2); c.lineTo(-s,s/2); c.closePath(); }
                else if(st===5) { for(let i=0;i<5;i++){ c.lineTo(Math.cos(i*Math.PI*2/5)*s, Math.sin(i*Math.PI*2/5)*s); c.lineTo(Math.cos((i+0.5)*Math.PI*2/5)*s/2, Math.sin((i+0.5)*Math.PI*2/5)*s/2); } c.closePath(); }
                else { for(let i=0;i<12;i++){ const r=i%2===0?s:s/3; c.lineTo(Math.cos(i*Math.PI/6)*r, Math.sin(i*Math.PI/6)*r); } c.closePath(); }
                c.fill(); c.stroke();

                c.fillStyle = this.boss.hasFired ? '#fff' : '#444';
                if(this.boss.isSpPhase) c.fillStyle = '#ff0033';
                if(this.boss.postSpMod && this.frame%10<5) c.fillStyle = '#ff0033';
                c.beginPath(); c.arc(0,0,10,0,Math.PI*2); c.fill();

                if(this.boss.inv) {
                    c.strokeStyle = 'rgba(255,255,255,0.4)'; c.setLineDash([5,5]);
                    c.beginPath(); c.arc(0,0,s+15,0,Math.PI*2); c.stroke(); c.setLineDash([]);
                }
                c.restore();
            }

            // Player Bullets 
            c.fillStyle = '#fff';
            this.bullets.forEach(b => {
                // 常に上を向いているため、弾も縦長に描画
                c.fillRect(b.x - 2, b.y - 10, 4, 20);
            });
            
            // Enemy Bullets
            c.fillStyle = '#fff';
            c.beginPath();
            this.eBullets.forEach(b => {
                if(b.t === 0) { c.moveTo(b.x, b.y); c.arc(b.x, b.y, 4, 0, Math.PI*2); }
            });
            c.fill();
            
            this.eBullets.forEach(b => {
                if(b.t === 1) { 
                    c.save(); c.translate(b.x, b.y); c.rotate(this.frame*0.1); 
                    c.fillStyle = '#fff'; c.fillRect(-4,-4,8,8);
                    c.fillStyle = '#000'; c.fillRect(-2,-2,4,4);
                    c.restore();
                }
                if(b.t === 2) {
                    const ang = Math.atan2(b.vy, b.vx); c.save(); c.translate(b.x, b.y); c.rotate(ang);
                    c.fillStyle = '#fff'; c.fillRect(-12,-2,24,4);
                    c.fillStyle = '#000'; c.fillRect(-10,-1,20,2); 
                    c.restore();
                }
            });

            // Player
            if(this.player.inv % 6 < 3) {
                c.fillStyle = '#000'; c.strokeStyle = '#fff'; c.lineWidth = 2;
                c.beginPath();
                // 常に上を向く
                c.moveTo(this.player.x, this.player.y - 15);
                c.lineTo(this.player.x + 12, this.player.y + 12);
                c.lineTo(this.player.x, this.player.y + 6);
                c.lineTo(this.player.x - 12, this.player.y + 12);
                c.closePath(); c.fill(); c.stroke();
                
                c.fillStyle = '#ff0033';
                c.fillRect(this.player.x - 2, this.player.y - 2, 4, 4);
            }
        }
    }
};

window.onload = () => { UI.showTitle(); Game.init(); };
</script>
